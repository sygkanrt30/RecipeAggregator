spring:
  application:
    name: recipe-aggregator
  frontend:
    base:
      url: http://localhost:3002
  backend:
    url:
      auth: api/v1/auth/**
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      properties:
        security.protocol: PLAINTEXT
  datasource:
    url: jdbc:postgresql://localhost:5435/recipe_service
    username: postgres
    password: 5435
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: false
    baseline-version: 1
    baseline-on-migrate: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        transaction:
          jta:
            platform: none
    database: postgresql

springdoc:
  swagger-ui:
    path: "/swagger-recipe-aggregator"

application:
  rest:
    api:
      prefix: /api

server:
  port: 8082

custom:
  kafka:
    topic: recipes
    group-id: recipe-group
    trusted:
      package: ru.practice.*
    offset-reset: earliest
    auto-commit: true

elasticsearch:
  host-and-port: localhost:9200

jwt:
  cookie-token-key: '{"kty":"oct","k":"956PBFst1FguLr5irJD-aQ"}'

web-site:
  lang: 'ru'

yandex:
  uri: 'https://translate.api.cloud.yandex.net/translate/v2/translate'
  api:
    key: 'AQVNzNKLpRuhWBf1okbHlSFBHzCPRzm2yN8aRnNN'
    folder-id: 'b1g0d3qs7g5eumgm9jjb'

csrf:
  token:
    header-name: X-CSRF-TOKEN

logging:
  file:
    path: ./logs
    name: ./logs/recipe-service.log
  level:
    org.springframework.security: INFO
    root: INFO
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 10
      total-size-cap: 5GB
  pattern:
    console: '%d{dd.MM.yyyy HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{dd.MM.yyyy HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'